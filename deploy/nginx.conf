map $uri $nextstep_cache_control {
    ~^/assets/ "public, max-age=31536000, immutable";
    default "no-cache, no-store, must-revalidate";
}

# Query strings can contain recipient-bound delivery references. Log the normalized
# path and omit Referer entirely so authentication links never reach access logs.
log_format nextstep_safe '$remote_addr - $remote_user [$time_local] '
                         '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                         '"$http_user_agent" "$http_x_forwarded_for"';

map $host $nextstep_hsts {
    dashboard.nextstep-soft.com "max-age=31536000; includeSubDomains";
    default "";
}

map $host $nextstep_coop {
    dashboard.nextstep-soft.com "same-origin-allow-popups";
    default "";
}

map $host $nextstep_csp {
    dashboard.nextstep-soft.com "default-src 'self'; base-uri 'self'; connect-src 'self' https://*.line.me https://*.line-scdn.net; font-src 'self' data:; form-action 'self' https://access.line.me; frame-ancestors 'self' https://*.line.me; img-src 'self' data: blob: https:; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; upgrade-insecure-requests";
    default "default-src 'self'; base-uri 'self'; connect-src 'self' https://*.line.me https://*.line-scdn.net; font-src 'self' data:; form-action 'self' https://access.line.me; frame-ancestors 'self' https://*.line.me; img-src 'self' data: blob: https:; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'";
}

upstream nextstep_api {
    zone nextstep_api 64k;
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 2s;
    server api:8080 resolve;
    keepalive 16;
}

server {
    listen 8080;
    server_name _;
    server_tokens off;
    access_log /var/log/nginx/access.log nextstep_safe;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 1m;
    gzip on;
    gzip_min_length 1024;
    gzip_types application/javascript application/json application/xml image/svg+xml text/css text/plain;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security $nextstep_hsts always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
    add_header Cross-Origin-Opener-Policy $nextstep_coop always;
    add_header Content-Security-Policy $nextstep_csp always;
    add_header Cache-Control $nextstep_cache_control always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://nextstep_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 45s;
        proxy_send_timeout 45s;
        proxy_buffering off;
    }

    location /assets/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
