name: frontend-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run context:verify
      - run: npm run test:context
      - name: Verify Living Context impact
        if: github.event_name == 'pull_request'
        env:
          CONTEXT_PR_BODY: ${{ github.event.pull_request.body }}
        run: bash scripts/context-impact.sh --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"
      - run: npm audit --audit-level=high
      - run: npm run contract:verify
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:liff-config
      - run: npm run liff:verify
        env:
          VITE_LINE_LIFF_ID: 9999999999-ciTestApp
      - run: npm run build
        env:
          VITE_LINE_LIFF_ID: 9999999999-ciTestApp
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          build-args: VITE_LINE_LIFF_ID=9999999999-ciTestApp
          tags: nextstep-dashboard-frontend:ci
      - name: Verify runtime security headers
        run: |
          set -eu
          container=$(docker run --rm -d --add-host api:127.0.0.1 -p 127.0.0.1:18080:8080 nextstep-dashboard-frontend:ci)
          trap 'docker rm -f "$container" >/dev/null 2>&1 || true' EXIT INT TERM
          attempts=0
          until curl -fsS http://127.0.0.1:18080/healthz >/dev/null 2>&1; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge 30 ]; then
              docker logs "$container"
              exit 1
            fi
            sleep 1
          done
          ./deploy/nginx-headers-test.sh
          ./deploy/nginx-access-log-test.sh "$container"
          ./deploy/nginx-upstream-test.sh nextstep-dashboard-frontend:ci 18081

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [verify, container]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify production LIFF configuration exists
        env:
          VITE_LINE_LIFF_ID: ${{ vars.VITE_LINE_LIFF_ID }}
        run: test -n "$VITE_LINE_LIFF_ID"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: VITE_LINE_LIFF_ID=${{ vars.VITE_LINE_LIFF_ID }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:main
